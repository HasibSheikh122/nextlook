{% extends 'accounts/base.html' %}

{% block title %}Verify OTP - AuthSystem{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-md w-full mx-4">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-8 text-center">
            <i class="fas fa-envelope text-5xl text-white mb-3"></i>
            <h2 class="text-3xl font-bold text-white">Verify Your Email</h2>
            <p class="text-indigo-100 mt-2">We've sent an OTP to {{ email }}</p>
        </div>
        
        <div class="p-8">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">
                        Enter OTP Code
                    </label>
                    <input type="text" name="otp" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-center text-2xl tracking-widest" placeholder="000000" maxlength="6" required>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-indigo-700 hover:to-purple-700 transition-all transform hover:scale-105">
                    <i class="fas fa-check-circle mr-2"></i> Verify OTP
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Didn't receive the code? 
                    <a href="{% url 'resend_otp' %}" class="text-indigo-600 hover:text-indigo-700 font-semibold">Resend OTP</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
