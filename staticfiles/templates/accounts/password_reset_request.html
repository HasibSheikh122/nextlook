{% extends 'accounts/base.html' %}

{% block title %}Reset Password - AuthSystem{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-md w-full mx-4">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-8 text-center">
            <i class="fas fa-key text-5xl text-white mb-3"></i>
            <h2 class="text-3xl font-bold text-white">Reset Password</h2>
            <p class="text-indigo-100 mt-2">We'll send you an OTP to reset your password</p>
        </div>
        
        <div class="p-8">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    {{ form.email }}
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-indigo-700 hover:to-purple-700 transition-all transform hover:scale-105">
                    <i class="fas fa-paper-plane mr-2"></i> Send Reset OTP
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Remember your password? 
                    <a href="{% url 'accounts:login' %}" class="text-indigo-600 hover:text-indigo-700 font-semibold">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
