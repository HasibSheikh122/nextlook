{% extends 'accounts/base.html' %}

{% block title %}Set New Password - AuthSystem{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-md w-full mx-4">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-8 text-center">
            <i class="fas fa-lock text-5xl text-white mb-3"></i>
            <h2 class="text-3xl font-bold text-white">Set New Password</h2>
            <p class="text-indigo-100 mt-2">Create a strong password for your account</p>
        </div>
        
        <div class="p-8">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        New Password
                    </label>
                    <input type="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Enter new password" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Confirm New Password
                    </label>
                    <input type="password" name="confirm_password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Confirm new password" required>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-indigo-700 hover:to-purple-700 transition-all transform hover:scale-105">
                    <i class="fas fa-key mr-2"></i> Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
